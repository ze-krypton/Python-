<!DOCTYPE html>
<html>
<head>
<title>Calendar</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
table { border-collapse: collapse; margin: 10px; float: left; }
th, td { border: 1px solid #010000; padding: 5px; text-align: center; width: 30px; height: 30px; }
th { background-color: #af4c4c; color: white; }
h2 { clear: both; }
</style>
</head>
<body>

<h1>Year Calendar</h1>
<input type="number" id="yearInput" placeholder="Enter Year" min="1900" max="2100">
<button onclick="generateCalendar()">Show Calendar</button>

<div id="calendarContainer"></div>

<script>
function generateCalendar() {
    const year = document.getElementById('yearInput').value;
    if (!year) return;
    const container = document.getElementById('calendarContainer');
    container.innerHTML = '';
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    for (let m = 0; m < 12; m++) {
        const monthDiv = document.createElement('div');
        const monthTitle = document.createElement('h2');
        monthTitle.textContent = months[m] + ' ' + year;
        monthDiv.appendChild(monthTitle);

        const table = document.createElement('table');
        const headerRow = document.createElement('tr');
        days.forEach(d => {
            const th = document.createElement('th');
            th.textContent = d;
            headerRow.appendChild(th);
        });
        table.appendChild(headerRow);

        let firstDay = new Date(year, m, 1).getDay();
        let numDays = new Date(year, m + 1, 0).getDate();
        let row = document.createElement('tr');

        for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement('td'));

        for (let d = 1; d <= numDays; d++) {
            if ((firstDay + d - 1) % 7 === 0 && d !== 1) {
                table.appendChild(row);
                row = document.createElement('tr');
            }
            const td = document.createElement('td');
            td.textContent = d;
            row.appendChild(td);
        }

        while (row.children.length < 7) row.appendChild(document.createElement('td'));
        table.appendChild(row);
        monthDiv.appendChild(table);
        container.appendChild(monthDiv);
    }
}
</script>

</body>
</html>
