<!DOCTYPE html>
<html>
<head>
<title>Web Page</title>
<style>
img { width:200px; }
.dropdown { position: relative; display: inline-block; margin-top: 20px; }
.dropdown button { background-color: #4CAF50; color: white; padding: 10px 20px; font-size: 16px; border: none; cursor: pointer; border-radius: 5px; }
.dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 5px; z-index: 1; padding: 5px 0; }
.dropdown-content a { color: black; padding: 8px 16px; text-decoration: none; display: block; }
.dropdown-content a:hover { background-color: #ddd; border-radius: 5px; }
.dropdown:hover .dropdown-content { display: block; }
</style>
<script>
function changeImage(img) { img.src = "img2.jpg"; }
function revertImage(img) { img.src = "img1.jpg"; }
function showAlert() { alert("Image Clicked!"); }
</script>
</head>

<body>

<img src="img1.jpg" onmouseover="changeImage(this)" onmouseout="revertImage(this)" onclick="showAlert()">

<div class="dropdown">
  <button>Menu</button>
  <div class="dropdown-content">
    <a href="page1.html">Page 1</a>
    <a href="page2.html">Page 2</a>
  </div>
</div>

</body>
</html>
