<!DOCTYPE html>
<html>
<head>
<title>Student Table</title>

<style>
body {
  font-family: Arial;
  background-color: #f4f6f8;
  text-align: center;
}

h2 {
  color: #2c3e50;
}

table {
  margin: auto;
  border-collapse: collapse;
  width: 60%;
  background: white;
  box-shadow: 0px 0px 10px gray;
}

th {
  background-color: #3498db;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
}

tr:nth-child(even) {
  background-color: #f2f2f2;
}
</style>

</head>

<body>

<h2>Student Details</h2>

<table>
<tr>
<th>Name</th>
<th>Course</th>
<th>Marks</th>
</tr>

<tr>
<td>Amit</td>
<td>BCA</td>
<td>85</td>
</tr>

</table>

</body>
</html>
