<html>
<head>
    <title>Compose Email</title>
    <style>
        body{ font-family: arial ; margin: 40px}
        table{border-collapse: collapse;}
        td{padding: 10px;}
        label{color: blue;font-size:18px;}
        input[type="button"] {padding: 8px 30px; font-size:16px; font-weight:bold; cursor:pointer;}
        textarea{width: 350px ; height: 120px; padding: 5px;}
        input[type="text"] {width: 350px; padding: 5px;}
    </style>
</head>
<body>
    <h2>Compose Email</h2>
    <table>
        <tr>
            <td><label>To</label></td>
            <td><input type="text" ></td>
        </tr>
        <tr>
            <td><label>Copy</label></td>
            <td><input type="text" ></td>
        </tr>
        <tr>
            <td><label>Message</label></td>
            <td><textarea ></textarea></td>
            <td><input type="button" value="SEND" onclick="sendEmail()"></td>
        </tr>
    </table>


</body>
</html>
