<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Book Catalog</title>
<style>
                body {
                    font-family: Arial, sans-serif;
                    margin: 40px;
                    background-color: #f5f5f5;
                }
                h2 {
                    color: #333;
                    text-align: center;
                }
                table {
                    width: 80%;
                    margin: 20px auto;
                    border-collapse: collapse;
                    background-color: #fff;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                }
                th {
                    background-color: #2c3e50;
                    color: #fff;
                    padding: 12px 15px;
                    text-align: left;
                }
                td {
                    padding: 10px 15px;
                    border-bottom: 1px solid #ddd;
                }
                tr:nth-child(even) {
                    background-color: #f9f9f9;
                }
                tr:hover {
                    background-color: #eaf2f8;
                }
            </style>
</head>
<body>
<h2>Book Catalog</h2>
<table>
<tr>
<th>S.No</th>
<th>Title</th>
<th>Author</th>
<th>Year</th>
<th>Price ($)</th>
</tr>
<tr>
<td>1</td>
<td>Pride and Prejudice</td>
<td>Jane Austen</td>
<td>1813</td>
<td>8.75</td>
</tr>
<tr>
<td>2</td>
<td>The Great Gatsby</td>
<td>F. Scott Fitzgerald</td>
<td>1925</td>
<td>10.99</td>
</tr>
<tr>
<td>3</td>
<td>1984</td>
<td>George Orwell</td>
<td>1949</td>
<td>9.99</td>
</tr>
<tr>
<td>4</td>
<td>The Catcher in the Rye</td>
<td>J.D. Salinger</td>
<td>1951</td>
<td>11.25</td>
</tr>
<tr>
<td>5</td>
<td>To Kill a Mockingbird</td>
<td>Harper Lee</td>
<td>1960</td>
<td>12.50</td>
</tr>
</table>
</body>
</html>
