<!DOCTYPE html>
<html lang="en">
<head>
 <title>Image Swap on Hover</title>
</head>
<body>
    <h2>Hover to swap the car image</h2>

    <img 
        src="https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg" 
        alt="Car 1"
        width="400"
        onmouseover="this.src='https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg';"
        onmouseout="this.src='https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg';"
    >

</body>
</html>
